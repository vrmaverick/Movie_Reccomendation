<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Recommender</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #f8fafc;
    }

    header p {
      margin-top: 0.4rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    /* ── Search bar ── */
    .search-wrap {
      max-width: 680px;
      margin: 0 auto 2.5rem;
      display: flex;
      gap: 0.6rem;
    }

    #query {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #query:focus { border-color: #6366f1; }
    #query::placeholder { color: #64748b; }

    #submit {
      padding: 0.75rem 1.4rem;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, opacity 0.2s;
    }

    #submit:hover:not(:disabled) { background: #4f46e5; }
    #submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Error banner ── */
    #error {
      display: none;
      max-width: 680px;
      margin: 0 auto 1.5rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      font-size: 0.9rem;
    }

    /* ── Results grid ── */
    #results {
      max-width: 1100px;
      margin: 0 auto;
      display: none;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 680px) {
      .columns { grid-template-columns: 1fr; }
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .column-header h2 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* left column — indigo */
    .col-content .column-header h2 { color: #818cf8; }
    .col-content .badge { background: #1e1b4b; color: #818cf8; border: 1px solid #3730a3; }

    /* right column — emerald */
    .col-hybrid .column-header h2 { color: #34d399; }
    .col-hybrid .badge { background: #022c22; color: #34d399; border: 1px solid #065f46; }

    /* ── Cards ── */
    .card {
      padding: 1rem 1.1rem;
      border-radius: 10px;
      margin-bottom: 0.75rem;
      border: 1px solid;
      transition: transform 0.15s;
    }

    .card:hover { transform: translateY(-2px); }

    .col-content .card {
      background: #1a1d2e;
      border-color: #2d2f6b;
    }

    .col-hybrid .card {
      background: #0f1f1a;
      border-color: #064e3b;
    }

    .card-title {
      font-size: 0.98rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.25rem;
    }

    .card-genre {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .card-reason {
      font-size: 0.82rem;
      line-height: 1.5;
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
    }

    .col-content .card-reason { background: #1e1b4b55; color: #a5b4fc; }
    .col-hybrid  .card-reason { background: #022c2255; color: #6ee7b7; }

    /* ── Loading state ── */
    .loading-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 3rem 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-wrap p { color: #64748b; font-size: 0.9rem; }

    /* ── Empty / placeholder ── */
    .empty {
      text-align: center;
      color: #475569;
      font-size: 0.9rem;
      padding: 2rem 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Movie Recommender</h1>
    <p>Compare keyword-based vs. hybrid AI search side by side</p>
  </header>

  <div class="search-wrap">
    <input
      id="query"
      type="text"
      placeholder="e.g. dark crime thriller with an unexpected ending"
      autocomplete="off"
    />
    <button id="submit">Search</button>
  </div>

  <div id="error"></div>

  <!-- Loading indicator -->
  <div class="loading-wrap" id="loading">
    <div class="spinner"></div>
    <p>Running both methods&hellip;</p>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="columns">

      <div class="col-content">
        <div class="column-header">
          <h2>Content-Based</h2>
          <span class="badge">BM25</span>
        </div>
        <div id="content-cards"></div>
      </div>

      <div class="col-hybrid">
        <div class="column-header">
          <h2>Hybrid</h2>
          <span class="badge">BM25 + Semantic + AI</span>
        </div>
        <div id="hybrid-cards"></div>
      </div>

    </div>
  </div>

  <script>
    const queryInput = document.getElementById('query');
    const submitBtn  = document.getElementById('submit');
    const errorBox   = document.getElementById('error');
    const loadingEl  = document.getElementById('loading');
    const resultsEl  = document.getElementById('results');
    const contentCards = document.getElementById('content-cards');
    const hybridCards  = document.getElementById('hybrid-cards');

    function setLoading(on) {
      loadingEl.style.display  = on ? 'flex' : 'none';
      resultsEl.style.display  = on ? 'none' : 'block';
      submitBtn.disabled = on;
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    function clearError() {
      errorBox.textContent = '';
      errorBox.style.display = 'none';
    }

    function buildCard(item) {
      const card = document.createElement('div');
      card.className = 'card';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = item.title;

      const genre = document.createElement('div');
      genre.className = 'card-genre';
      genre.textContent = item.genre;

      const reason = document.createElement('div');
      reason.className = 'card-reason';
      reason.textContent = item.reason;

      card.appendChild(title);
      card.appendChild(genre);
      card.appendChild(reason);
      return card;
    }

    function renderResults(data) {
      contentCards.innerHTML = '';
      hybridCards.innerHTML  = '';

      if (!data.content_based.length) {
        contentCards.innerHTML = '<p class="empty">No results found.</p>';
      } else {
        data.content_based.forEach(item => contentCards.appendChild(buildCard(item)));
      }

      if (!data.hybrid.length) {
        hybridCards.innerHTML = '<p class="empty">No results found.</p>';
      } else {
        data.hybrid.forEach(item => hybridCards.appendChild(buildCard(item)));
      }
    }

    async function search() {
      const query = queryInput.value.trim();
      if (!query) {
        showError('Please enter a search query.');
        return;
      }

      clearError();
      setLoading(true);

      try {
        const response = await fetch('/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || `Server error ${response.status}`);
        }

        renderResults(data);
        setLoading(false);
        resultsEl.style.display = 'block';

      } catch (err) {
        setLoading(false);
        showError(err.message || 'Something went wrong. Please try again.');
      }
    }

    submitBtn.addEventListener('click', search);
    queryInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });
  </script>

</body>
</html>
